<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posadas Bonarda</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @theme {
      --color-beige: #bfae8f;
      --color-beige-light: #DCD6CA;
      --color-beige-medium: #938C74;
      --color-text: #6a6156;
      --color-text-light: #747C6C;
      --color-bg: #f6f4f1;
      --color-bg-alt: #F0F0F0;
      --color-green: #2a3222;
      --color-green-light: #747C6C;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-display: 'Playfair Display', Georgia, serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    h1, h2, h3, h4 { font-family: 'Playfair Display', Georgia, serif; }
    
    /* Fade-in effect */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
  </style>
</head>
<body class="bg-[#f6f4f1] text-[#6a6156] min-h-screen">
  
  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 pt-4">
    <div class="bg-[#bfae8f] rounded-full px-6 py-3 flex items-center justify-between shadow-lg">
      <a href="/" class="text-xl font-semibold tracking-[0.2em] text-[#2a3222] hover:opacity-70 transition-opacity">
        BONARDA
      </a>

      <div class="hidden md:flex items-center gap-8">
        <a href="/" class="text-sm font-medium text-[#2a3222] hover:text-[#3d4632] hover:scale-105 transition-all duration-300">Inicio</a>
        <a href="/sobre_nosotros" class="text-sm font-medium text-[#2a3222] hover:text-[#3d4632] hover:scale-105 transition-all duration-300">Sobre Nosotros</a>
        <a href="/galeria" class="text-sm font-medium text-[#2a3222] hover:text-[#3d4632] hover:scale-105 transition-all duration-300">Galería</a>
        <a href="/crear_reserva" class="text-sm font-medium text-[#2a3222] hover:text-[#3d4632] hover:scale-105 transition-all duration-300">Reservas</a>
        <a href="/crear_usuario" class="px-5 py-2 rounded-full bg-[#2a3222] text-white text-sm font-semibold hover:bg-[#3d4632] transition-all">
          [Iniciar Sesión]
        </a>
      </div>

      <button class="md:hidden p-2" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-[#bfae8f]/90 backdrop-blur-md rounded-2xl mt-2 p-4 shadow-lg">
      <a href="/" class="block py-2 text-sm font-medium">Inicio</a>
      <a href="/sobre_nosotros" class="block py-2 text-sm font-medium">Sobre Nosotros</a>
      <a href="/galeria" class="block py-2 text-sm font-medium">Galería</a>
      <a href="/crear_reserva" class="block py-2 text-sm font-medium">Reservas</a>
      <a href="/crear_usuario" class="block py-2 text-sm font-medium text-[#2a3222]">Iniciar Sesión</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <main class="relative h-screen flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0">
      <img src="/static/assets/images/sala_1.jpg" alt="Posada Bonarda" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/10 to-black/30"></div>
    </div>

    <div class="relative z-10 text-center px-4 fade-in">
      <h1 class="text-5xl md:text-7xl lg:text-8xl font-display font-semibold text-[#DCD6CA] tracking-tight mb-6 text-balance drop-shadow-lg fade-in fade-in-delay-1">
        Posadas Bonarda
      </h1>
      <p class="text-lg md:text-xl text-[#DCD6CA] max-w-xl mx-auto mb-10 text-balance drop-shadow fade-in fade-in-delay-2">
        Tu escape rural definitivo - confort, tranquilidad y naturaleza en un solo lugar
      </p>
      <a href="/crear_reserva" class="inline-block px-8 py-4 rounded-xl bg-[#2a3222] text-white font-semibold text-lg shadow-xl hover:bg-[#3d4632] transition-all hover:scale-105 hover:shadow-2xl fade-in fade-in-delay-3">
        ¡RESERVA AHORA!
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="absolute bottom-0 left-0 right-0 py-4 bg-[#bfae8f]">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-sm text-[#2a3222]">
        www.bonardaposadas.com
      </p>
    </div>
  </footer>

  <script src="/static/assets/js/home.js"></script>
</body>
</html>
