<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios - Bonarda Posadas</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @theme {
      --color-beige: #bfae8f;
      --color-beige-light: #DCD6CA;
      --color-beige-medium: #938C74;
      --color-text: #6a6156;
      --color-text-light: #747C6C;
      --color-bg: #f6f4f1;
      --color-bg-alt: #F0F0F0;
      --color-green: #2a3222;
      --color-green-light: #747C6C;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-display: 'Playfair Display', Georgia, serif;
    }
    body { font-family: 'Inter', system-ui, sans-serif; }
    h1, h2, h3, h4 { font-family: 'Playfair Display', Georgia, serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-[#f6f4f1] text-[#6a6156] min-h-screen flex flex-col">
  
  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 pt-4">
    <div class="bg-[#bfae8f]/90 backdrop-blur-md rounded-full px-6 py-3 flex items-center justify-between shadow-lg">
      <a href="/" class="text-xl font-semibold tracking-[0.2em] text-[#2a3222] hover:opacity-70 transition-opacity">
        BONARDA
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="/" class="text-sm font-medium text-[#2a3222] hover:text-[#3d4632] hover:scale-105 transition-all duration-300">Inicio</a>
        <a href="/crear_reserva" class="text-sm font-medium text-[#2a3222] hover:text-[#3d4632] hover:scale-105 transition-all duration-300">Reservas</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 py-24 px-4">
    <div class="max-w-5xl mx-auto">
      <div class="bg-[#F0F0F0] rounded-2xl shadow-xl border border-[#DCD6CA] overflow-hidden fade-in">
        <div class="px-6 py-4 border-b border-[#DCD6CA]">
          <h1 class="text-2xl font-semibold text-[#2a3222]">Gestión de Usuarios</h1>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-[#938C74]">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">ID</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">Nombre</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">Email</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">Acciones</th>
              </tr>
            </thead>
            <tbody id="users-table-body" class="divide-y divide-[#DCD6CA]">
            </tbody>
          </table>
        </div>

        <div id="loading-message" class="px-6 py-8 text-center text-[#747C6C]">
          Cargando usuarios...
        </div>
        
        <div id="error-message" class="hidden px-6 py-4 text-center text-red-600 bg-red-50 rounded-lg mx-4 mb-4">
        </div>
      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" onclick="closeEditModal()"></div>
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white rounded-2xl shadow-2xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold text-[#2a3222]">Editar Usuario</h2>
        <button onclick="closeEditModal()" class="p-2 text-[#747C6C] hover:text-[#2a3222]">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      
      <form id="edit-form" class="space-y-4">
        <input type="hidden" id="edit-user-id">
        <div>
          <label for="edit-nombre" class="block text-sm font-medium text-[#6a6156] mb-2">Nombre</label>
          <input type="text" id="edit-nombre" required
            class="w-full h-12 px-4 rounded-lg border border-[#DCD6CA] bg-gray-50 text-[#6a6156] focus:bg-white focus:border-[#2a3222] focus:ring-2 focus:ring-[#2a3222]/20 transition-all outline-none"
          >
        </div>
        <div>
          <label for="edit-apellido" class="block text-sm font-medium text-[#6a6156] mb-2">Apellido</label>
          <input type="text" id="edit-apellido" required
            class="w-full h-12 px-4 rounded-lg border border-[#DCD6CA] bg-gray-50 text-[#6a6156] focus:bg-white focus:border-[#2a3222] focus:ring-2 focus:ring-[#2a3222]/20 transition-all outline-none"
          >
        </div>
        <div>
          <label for="edit-email" class="block text-sm font-medium text-[#6a6156] mb-2">Email</label>
          <input type="email" id="edit-email" required
            class="w-full h-12 px-4 rounded-lg border border-[#DCD6CA] bg-gray-50 text-[#6a6156] focus:bg-white focus:border-[#2a3222] focus:ring-2 focus:ring-[#2a3222]/20 transition-all outline-none"
          >
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeEditModal()" class="flex-1 h-12 rounded-xl border-2 border-[#DCD6CA] text-[#747C6C] font-semibold hover:bg-gray-50 transition-colors">
            Cancelar
          </button>
          <button type="submit" class="flex-1 h-12 rounded-xl bg-[#2a3222] text-white font-semibold hover:bg-[#3d4632] transition-all">
            Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/assets/js/gestion_usuarios.js"></script>
</body>
</html>
